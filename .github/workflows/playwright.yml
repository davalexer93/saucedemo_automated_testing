name: Playwright Tests
on:
  push:
    branches:
        - main
        - master
        - staging
  schedule:
    - cron: "00 15 * * FRI"
  workflow_dispatch:      
  
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
            - commands: npx playwright test saucedemoSuccess.spec.ts -g "successful shop in saucedemo"
            - commands: npx playwright test saucedemoSuccess.spec.ts -g "failed login in saucedemo"
            - commands: npx playwright test saucedemoCheckoutZero.spec.ts
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 26
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: ${{ matrix.commands }}
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 1